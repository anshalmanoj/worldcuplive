```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Cup Live</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}


body{

    background:#050505;
    color:white;

}


/* NAVBAR */

nav{

    height:80px;

    padding:0 5%;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:rgba(15,15,15,.8);

    backdrop-filter:blur(20px);

    border-bottom:1px solid rgba(255,255,255,.08);

    position:sticky;

    top:0;

    z-index:10;

}



.logo{

    font-size:28px;

    font-weight:800;

    background:linear-gradient(90deg,#00e5ff,#0077ff);

    -webkit-background-clip:text;

    color:transparent;

}



.live{

    display:flex;

    gap:10px;

    align-items:center;

    background:#ff003c;

    padding:10px 18px;

    border-radius:50px;

    font-weight:bold;

}



.dot{

    height:10px;

    width:10px;

    background:white;

    border-radius:50%;

    animation:blink 1s infinite;

}



@keyframes blink{

    50%{
        opacity:.3;
    }

}



/* MAIN */


.container{

    padding:40px 5%;

    background:
    radial-gradient(circle at top,#123,#050505 50%);

    min-height:100vh;

}



.player{

    width:100%;

    height:75vh;

    background:#000;

    border-radius:25px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.12);

    box-shadow:

    0 30px 80px rgba(0,0,0,.8);

}



.player iframe{

    width:100%;

    height:100%;

    border:0;

}




/* BUTTONS */


.actions{

    display:flex;

    justify-content:center;

    gap:20px;

    margin:25px 0;

}



button{

    padding:14px 30px;

    border:none;

    border-radius:50px;

    cursor:pointer;

    color:white;

    font-weight:700;

    background:

    linear-gradient(90deg,#00e5ff,#0077ff);

    transition:.3s;

}



button:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 30px rgba(0,200,255,.4);

}




/* CARDS */


.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

    gap:25px;

}



.card{

    background:

    linear-gradient(

    145deg,

    rgba(255,255,255,.08),

    rgba(255,255,255,.02)

    );

    border:1px solid rgba(255,255,255,.1);

    padding:25px;

    border-radius:22px;

    backdrop-filter:blur(15px);

}



.card h2{

    color:#00d9ff;

    margin-bottom:15px;

}




.match{

    background:#111;

    padding:18px;

    border-radius:15px;

    margin-top:10px;

    display:flex;

    justify-content:space-between;

}





/* FOOTER */


footer{

    text-align:center;

    padding:30px;

    color:#777;

    border-top:1px solid #222;

}




/* MOBILE */


@media(max-width:700px){


.logo{

    font-size:22px;

}


.container{

    padding:20px;

}


.player{

    height:35vh;

    border-radius:15px;

}


.actions{

    flex-direction:column;

}


button{

    width:100%;

}


}

</style>

</head>


<body>


<nav>

<div class="logo">
⚽ World Cup Live
</div>


<div class="live">

<span class="dot"></span>

LIVE

</div>


</nav>



<div class="container">


<div class="player">


<!-- Replace with your own authorized embed -->

<iframe

src="YOUR_EMBED_URL"

allow="autoplay; encrypted-media; picture-in-picture; fullscreen"

allowfullscreen

scrolling="no">

</iframe>


</div>




<div class="actions">


<button onclick="fullscreenPlayer()">

⛶ Fullscreen

</button>


<button onclick="location.reload()">

↻ Reload

</button>


</div>




<div class="cards">


<div class="card">

<h2>
🏆 Featured Match
</h2>

<div class="match">

<span>Team A</span>

<b>VS</b>

<span>Team B</span>

</div>

</div>



<div class="card">

<h2>
📅 Schedule
</h2>

<p>
⚽ Upcoming Matches
</p>

<br>

<p>
⚽ Tournament Events
</p>

</div>



<div class="card">

<h2>
🔥 Highlights
</h2>

<p>
Latest moments and updates.
</p>

</div>


</div>


</div>



<footer>

Made by Anshal Manoj

</footer>




<script>

function fullscreenPlayer(){

const player=document.querySelector(".player");


if(player.requestFullscreen){

player.requestFullscreen();

}

}

</script>



</body>
</html>
```
