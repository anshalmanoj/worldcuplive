```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>World Cup Live</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#050505;
    color:white;
}


/* NAVBAR */

nav{
    height:80px;
    padding:0 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(15,15,15,.75);
    backdrop-filter:blur(20px);

    position:sticky;
    top:0;
    z-index:100;

    border-bottom:1px solid rgba(255,255,255,.08);
}


.logo{
    font-size:28px;
    font-weight:800;
    background:linear-gradient(90deg,#00e5ff,#0077ff);
    -webkit-background-clip:text;
    color:transparent;
}


.live{
    display:flex;
    align-items:center;
    gap:8px;

    background:#ff003c;
    padding:10px 18px;
    border-radius:50px;

    font-weight:700;
    font-size:14px;
}


.dot{
    width:9px;
    height:9px;
    background:white;
    border-radius:50%;
    animation:blink 1s infinite;
}


@keyframes blink{
    50%{
        opacity:.3;
    }
}



/* HERO */

.hero{

    min-height:90vh;
    padding:40px 5%;

    background:
    radial-gradient(circle at top,#123,#050505 45%);

}


.player{

    width:100%;
    height:70vh;

    background:#000;

    border-radius:25px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
    0 30px 80px rgba(0,0,0,.8);

}


.player video,
.player iframe{

    width:100%;
    height:100%;
    border:0;

}




/* BUTTONS */

.actions{

    display:flex;
    justify-content:center;
    gap:20px;
    margin:25px 0;

}


button{

    padding:14px 30px;

    border:none;

    border-radius:50px;

    background:
    linear-gradient(90deg,#00e5ff,#0077ff);

    color:white;

    font-weight:700;

    cursor:pointer;

    transition:.3s;

}


button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 30px rgba(0,200,255,.4);

}




/* CARDS */


.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:25px;

    margin-top:35px;

}


.card{

    background:
    linear-gradient(
    145deg,
    rgba(255,255,255,.08),
    rgba(255,255,255,.02)
    );

    border:1px solid rgba(255,255,255,.1);

    border-radius:22px;

    padding:25px;

    backdrop-filter:blur(15px);

}


.card h2{

    color:#00d9ff;

    margin-bottom:15px;

}



.match{

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:#111;

    padding:18px;

    border-radius:15px;

    margin-top:12px;

}



.team{

    font-weight:700;

}




/* FOOTER */


footer{

    padding:30px;

    text-align:center;

    color:#777;

    border-top:1px solid #222;

}



/* MOBILE */


@media(max-width:700px){

nav{

    padding:0 20px;

}


.logo{

    font-size:22px;

}


.hero{

    padding:20px;

}


.player{

    height:35vh;

    border-radius:15px;

}


.actions{

    flex-direction:column;

}


button{

    width:100%;

}

}

</style>

</head>


<body>



<nav>

<div class="logo">
⚽ World Cup Live
</div>


<div class="live">
<span class="dot"></span>
LIVE
</div>


</nav>



<section class="hero">


<div class="player">

<!-- Insert your own licensed player here -->

<video controls>
</video>


</div>



<div class="actions">

<button onclick="fullscreen()">
⛶ Fullscreen
</button>


<button onclick="location.reload()">
↻ Refresh
</button>


</div>



<div class="grid">


<div class="card">

<h2>
🏆 Featured Match
</h2>


<div class="match">

<span class="team">
Team A
</span>

VS

<span class="team">
Team B
</span>

</div>


</div>



<div class="card">

<h2>
📅 Upcoming
</h2>

<p>
⚽ Next Match
</p>

<br>

<p>
⚽ Tournament Final
</p>


</div>



<div class="card">

<h2>
🔥 Highlights
</h2>

<p>
Latest goals, moments and analysis.
</p>

</div>


</div>


</section>



<footer>

Made by Anshal Manoj

</footer>




<script>

function fullscreen(){

let box=document.querySelector(".player");

if(box.requestFullscreen){

box.requestFullscreen();

}

}

</script>


</body>
</html>
```
