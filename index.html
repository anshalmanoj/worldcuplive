<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream | StrawStream</title>
    <style>
        /* Modern CSS Variables */
        :root {
            --bg-color: #0b0c10;
            --surface-color: #15171e;
            --primary-color: #ff3b30; /* Vibrant red for LIVE status */
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --border-color: #242731;
            --glow-effect: 0 8px 32px rgba(255, 59, 48, 0.15);
        }

        /* Base & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Navigation */
        header {
            background-color: var(--bg-color);
            padding: 16px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo span {
            color: var(--primary-color);
        }

        /* Main Theater Layout */
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 5%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Video Player Wrapper */
        .player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--glow-effect);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Stream Details */
        .stream-info {
            background-color: var(--surface-color);
            padding: 20px 24px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stream-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 59, 48, 0.1);
            color: var(--primary-color);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 59, 48, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .stream-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .stream-meta {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                padding: 16px 3%;
                gap: 16px;
            }
            .stream-info {
                padding: 16px;
            }
            .stream-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <a href="#" class="logo">Straw<span>Stream</span></a>
    </header>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Video Player -->
        <main class="player-wrapper">
            <iframe 
                src="https://player.xyzstreams.st/embed/fox-usa2" 
                width="100%" 
                height="100%" 
                frameborder="0" 
                scrolling="no" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen>
            </iframe>
        </main>

        <!-- Minimal Stream Details -->
        <section class="stream-info">
            <div class="stream-header">
                <span class="live-badge">● Live</span>
                <h1 class="stream-title">World Cup Broadcast</h1>
            </div>
            <div class="stream-meta">
                Fox Sports Event Coverage
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 StrawStream. All rights reserved.</p>
    </footer>

</body>
</html>
