<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Live</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0b0b0b;
    color:#fff;
}

header{
    background:#111;
    padding:18px;
    text-align:center;
    border-bottom:1px solid #222;
}

header h1{
    color:#00d4ff;
    font-size:30px;
}

header p{
    color:#aaa;
    margin-top:6px;
}

.player{
    width:100%;
    height:calc(100vh - 130px);
    padding:15px;
}

.player iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:12px;
    background:#000;
}

.controls{
    display:flex;
    justify-content:center;
    gap:12px;
    padding:15px;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:8px;
    background:#00d4ff;
    color:#000;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    background:#00b3d6;
}

footer{
    text-align:center;
    padding:12px;
    color:#777;
    border-top:1px solid #222;
}
</style>
</head>
<body>

<header>
    <h1>⚽ World Cup Live</h1>
    <p>FOX Sports Live Stream</p>
</header>

<div class="player" id="player">
    <iframe
        src="https://player.xyzstreams.st/embed/fox-usa2"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        allowfullscreen
        scrolling="no">
    </iframe>
</div>

<div class="controls">
    <button onclick="fullscreenPlayer()">⛶ Fullscreen</button>
    <button onclick="location.reload()">↻ Reload</button>
</div>

<footer>
    Responsive HTML Sports Player
</footer>

<script>
function fullscreenPlayer(){
    const player=document.getElementById("player");

    if(player.requestFullscreen){
        player.requestFullscreen();
    }else if(player.webkitRequestFullscreen){
        player.webkitRequestFullscreen();
    }else if(player.msRequestFullscreen){
        player.msRequestFullscreen();
    }
}
</script>

</body>
</html>
